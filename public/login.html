<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Credit Card Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <h1 style="text-align: center;">💳 Login</h1>
        <div class="card-form">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <p style="text-align: center; margin-top: 10px;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
            <p id="errorMsg" style="color: red; text-align: center;"></p>
        </div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                document.getElementById('errorMsg').innerText = 'Please enter both username and password';
                return;
            }

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('user', data.username);
                window.location.href = '/';
            } else {
                document.getElementById('errorMsg').innerText = data.error;
            }
        }
    </script>
</body>
</html>
